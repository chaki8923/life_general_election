name: Auto-merge

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  merge:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Find PR for this workflow run
        id: find-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          pr_number=$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --head "$HEAD_BRANCH" \
            --state open \
            --json number,labels,isDraft,headRefOid \
            --jq ".[] | select(.headRefOid == \"$HEAD_SHA\") | .number" \
            | head -n1)

          if [ -z "$pr_number" ]; then
            echo "No open PR matched head SHA $HEAD_SHA on branch $HEAD_BRANCH — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          pr_json=$(gh pr view "$pr_number" --repo "$GITHUB_REPOSITORY" --json isDraft,labels)
          is_draft=$(echo "$pr_json" | jq -r '.isDraft')
          has_label=$(echo "$pr_json" | jq -r '.labels[].name' | grep -Fx 'auto-merge' || true)

          if [ "$is_draft" = "true" ]; then
            echo "PR #$pr_number is a draft — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "$has_label" ]; then
            echo "PR #$pr_number does not have the 'auto-merge' label — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Squash-merge PR
        if: steps.find-pr.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.find-pr.outputs.pr_number }}
        run: |
          gh pr merge "$PR_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --squash \
            --delete-branch
