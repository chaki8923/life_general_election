name: Claude Code

on:
  issues:
    types: [opened, assigned, labeled]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude') || contains(github.event.label.name, 'claude'))) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Claude Code
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: "claude-sonnet-5"
          allowed_tools: "Bash(npm run lint),Bash(npx tsc --noEmit),Bash(npm ci),Bash(npm test)"
          custom_instructions: |
            このプロジェクトは Expo v54 + Expo Router のアプリです。
            AGENTS.md の指示に従い、https://docs.expo.dev/versions/v57.0.0/ の
            バージョン別ドキュメントを必ず参照してください。
            返答は日本語で行ってください。
            実装後は npx tsc --noEmit と npm run lint を必ず実行し、
            通過を確認してから PR を作成してください。
            PR には `auto-merge` ラベルを付与してください(自動マージ対象)。
