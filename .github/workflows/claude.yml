name: Claude Code

on:
  issues:
    types: [opened, assigned, labeled]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude') || contains(github.event.label.name, 'claude'))) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Claude Code
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: "claude-sonnet-5"
          allowed_tools: "Bash(npm run lint),Bash(npx tsc --noEmit),Bash(npm ci),Bash(npm test),Bash(gh pr create:*),Bash(gh pr edit:*),Bash(gh label create:*),Bash(gh label list:*)"
          custom_instructions: |
            このプロジェクトは Expo v54 + Expo Router のアプリです。
            AGENTS.md の指示に従い、https://docs.expo.dev/versions/v57.0.0/ の
            バージョン別ドキュメントを必ず参照してください。
            返答は日本語で行ってください。

            **PR 作成手順(必須)**:
            1. 実装完了後、`npx tsc --noEmit` と `npm run lint` を実行して通過を確認
            2. `git add`, `git commit`, `git push origin <ブランチ名>` で変更をプッシュ
            3. **手動PR作成リンクの案内は禁止**。必ず `gh pr create` コマンドで自分でPRを作成すること:
               ```
               gh pr create \
                 --base main \
                 --head <現在のブランチ名> \
                 --title "<タイトル>" \
                 --body "<PR説明>" \
                 --label auto-merge
               ```
            4. もし `auto-merge` ラベルが存在しない場合は先に作成する:
               ```
               gh label create auto-merge --color "0E8A16" --description "CI通過後に自動マージ" || true
               ```
            5. PR作成後、URLをコメントで報告する
