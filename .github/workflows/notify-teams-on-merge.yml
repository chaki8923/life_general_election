name: Notify Teams on merge

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  notify:
    # クローズのうちマージされたものだけ通知（マージせず閉じたPRは対象外）
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Send Teams notification
        env:
          WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          # PRタイトル等は任意文字列なので env 経由で渡し、jq --arg でJSON化する
          # （run 内に直接展開するとクォート破壊やインジェクションの恐れがある）
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "TEAMS_WEBHOOK_URL secret が未設定のため通知をスキップします"
            exit 0
          fi

          merged_at=$(TZ=Asia/Tokyo date '+%Y/%m/%d %H:%M')

          payload=$(jq -n \
            --arg title "$PR_TITLE" \
            --arg number "$PR_NUMBER" \
            --arg url "$PR_URL" \
            --arg author "$PR_AUTHOR" \
            --arg mergedAt "$merged_at" \
            '{
              type: "message",
              attachments: [
                {
                  contentType: "application/vnd.microsoft.card.adaptive",
                  contentUrl: null,
                  content: {
                    "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                    type: "AdaptiveCard",
                    version: "1.4",
                    msteams: { width: "Full" },
                    body: [
                      {
                        type: "TextBlock",
                        size: "Medium",
                        weight: "Bolder",
                        wrap: true,
                        text: "✅ マージ完了！実装が main に取り込まれました"
                      },
                      {
                        type: "TextBlock",
                        wrap: true,
                        text: "PR #\($number): \($title)"
                      },
                      {
                        type: "TextBlock",
                        isSubtle: true,
                        wrap: true,
                        text: "作成者: \($author) / \($mergedAt)"
                      }
                    ],
                    actions: [
                      { type: "Action.OpenUrl", title: "PRを見る", url: $url }
                    ]
                  }
                }
              ]
            }')

          curl -sS --fail-with-body -X POST \
            -H 'Content-Type: application/json' \
            -d "$payload" \
            "$WEBHOOK_URL"
          echo "Teams への通知に成功しました"
